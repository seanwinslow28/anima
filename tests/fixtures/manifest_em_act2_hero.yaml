# Act 2 escalation-hatch verification fixture for Em (vision_critic).
# Used by Task 11 verification of commit 8 — see
# /Users/seanwinslow/.claude/plans/greedy-squishing-wall.md.
# Tags the Act 2 revelation anchor with impact_tags: [hero] so Em is forced
# onto the Opus 4.7 escalation path regardless of Gemini's confidence.
# The DAG runner's literal: binding only supports strings; this fixture
# stashes impact_tags under act2.shots.revelation and pulls it via the
# manifest: binding language.
project:
  name: "anima-test-em-act2-hero"
anchor:
  path: "images/2D-Character-Sketch-Sean-v1.png"
  label: "A-2"
style:
  aesthetic: "traditional animation pencil test"
critics:
  placement:
    per_frame_generate: [T1, T2]
  t2:
    default_model: "gemini-3.1-pro-via-anti-gravity"
    escalation_model: "claude-opus-4-7-via-sdk"
    escalation_threshold: 0.7
    escalation_tags: [hero, identity_critical]
    default_context_files: []
    auto_apply: false
    per_call_timeout_s: 30
    wall_budget_s: 60
acceptance_criteria:
  path: "tests/fixtures/criteria_em_phase56.json"
  criteria_locked: false
act2:
  shots:
    revelation:
      impact_tags: [hero]  # forces Opus escalation regardless of Gemini's confidence
phases:
  enabled: ["phase_5"]
  phase_5:
    nodes:
      - id: em_revelation_critic
        node: vision_critic
        inputs:
          image_path: "literal:runs/act2-exploration/concepts/zone3/revelation.png"
          beat_description: "literal:Act 2 revelation anchor — Sean's reaction to the AI/animation bridge, contemplative half-smile, soft lighting"
          frame_id: "literal:revelation"
          impact_tags: "manifest:act2.shots.revelation.impact_tags"
          checkpoint: "literal:phase_5_generate"
