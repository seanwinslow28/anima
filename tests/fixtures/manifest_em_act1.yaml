# Minimal manifest exercising Em (vision_critic) against an Act 1 reference frame.
# Used by Task 10 verification of commit 8 — see
# /Users/seanwinslow/.claude/plans/greedy-squishing-wall.md.
# Wires a single vision_critic node against the approved F06 keyframe so the
# AgentSpec contract / cache key / cites_criteria invariant / patch staging
# can be exercised end-to-end through the DAG runner.
project:
  name: "anima-test-em-act1"
anchor:
  path: "images/2D-Character-Sketch-Sean-v1.png"
  label: "A-2"
style:
  aesthetic: "traditional animation pencil test"
critics:
  placement:
    per_frame_generate: [T1, T2]
  t2:
    default_model: "gemini-3.1-pro-via-anti-gravity"
    escalation_model: "claude-opus-4-7-via-sdk"
    escalation_threshold: 0.7
    escalation_tags: [hero, identity_critical]
    default_context_files: []  # keep prompt small for verification
    auto_apply: false
    per_call_timeout_s: 30
    wall_budget_s: 60
acceptance_criteria:
  path: "tests/fixtures/criteria_em_phase56.json"
  criteria_locked: false
phases:
  enabled: ["phase_5"]
  phase_5:
    nodes:
      - id: em_f06_critic
        node: vision_critic
        inputs:
          image_path: "literal:runs/run_2026-04-04_174805/approved/PT_A1_F06_key.png"
          beat_description: "literal:F06 — glance down, eyes on stylus, contemplative; head tilts ~15 degrees downward"
          frame_id: "literal:F06"
          # impact_tags omitted on purpose — the DAG binding language only
          # supports string literals; vision_critic.py defaults to [] when
          # the input isn't bound, which is what we want here.
          checkpoint: "literal:phase_5_generate"
