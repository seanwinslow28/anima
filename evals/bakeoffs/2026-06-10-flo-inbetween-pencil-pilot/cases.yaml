      - evals/bakeoffs/2026-06-10-flo-inbetween-pencil-pilot/fixtures/PT_A1_F01_key.png
      - evals/bakeoffs/2026-06-10-flo-inbetween-pencil-pilot/fixtures/PT_A1_F06_key.png
    per_view_anchors: *f01f06_refs
    reference_target: evals/bakeoffs/2026-06-10-flo-inbetween-pencil-pilot/fixtures/PT_A1_F01toF06_IB01.png
    prompt: >
      In-between frame for a 2D pencil-test animation. Image 1 and image 2 are two approved,
      consecutive keyframes. Generate the single in-between drawing at approximately 25% of the
      way from image 1 to image 2: Sean's head just beginning to tilt down toward the stylus,
      eyes starting to drop, a slight shoulder dip beginning. Hold identity, costume, hair, full
      color palette, and proportions constant with BOTH references. Keep the warm pencil-test
      render exactly — graphite line, flat color fills, cross-hatch shadow, visible cream
      production-paper grain. Stylus in the right hand. Fixed camera, locked tripod. Do NOT clean
      up, re-ink, smooth, or re-style the drawing into a digital look. 16:9. No text or watermarks.
    aspect_ratio: "16:9"
    register: pencil-test-colored
    probe: "early tween of a subtle head tilt — grain-preservation floor. If the pencil grain slicks here on a near-no-op motion, the model is disqualified."
    difficulty: moderate
    is_intentionally_red: false
    sean_note: "Compare the output against PT_A1_F01toF06_IB01.png (the approved IB) for grain + morph; DINOv2 scores against F01 & F06 (min)."
    beat_description: "Sean beginning to glance down toward the stylus, head tilting, pencil-test register."
    checkpoint: phase_5_generate
    character_id: sean
    case_class: identity_style
    expected_verdict: pass
    expected_cites: []

