# Flo in-between pencil-preservation pilot — case set (n=14).
#
# Ground truth: runs/run_2026-04-04_174805/approved/ — 7 approved Act-1 transitions with 14
# approved in-between (IB) targets. Each case is ONE approved IB: the two endpoint keyframes are
# the `references` AND the `per_view_anchors` (score the output's DINOv2 against BOTH endpoints
# and take the MIN — the Subject-Collapse floor, eval-strategy §3.5). The approved IB itself is
# the `reference_target` — the visual reference for what a GOOD in-between looks like, used for
# Sean's grain/morph review; it is NOT a DINOv2 target.
#
# Prompt convention: each case names a tween FRACTION (IB index within its transition) and the
# beat motion from docs/pencil-test/pencil-test-storyboard.md (Act 1). The prompt is held CONSTANT across all
# four variants — only the engine varies. The pencil-preservation clauses (graphite line, cream
# paper grain, "do NOT clean up / re-style into a digital look") are the whole point: the two
# failure modes Sean's eye arbitrates are (a) grain slicked into clean digital and (b) the figure
# morphing through the tween (the Reve failure DINOv2 missed). DINOv2 headlines, Em corroborates,
# Sean decides. SHIPS-RED: do NOT relax a case so a variant passes.
#
# Per-case schema mirrors evals/bakeoffs/2026-06-07-reve-vs-nb2-editing/cases.yaml:
#   name, test, edit_type (remix — two endpoints), references (the 2 endpoints),
#   per_view_anchors (the 2 endpoints; MIN), reference_target (the approved IB; Sean's eye only),
#   prompt, aspect_ratio, register, probe, difficulty, is_intentionally_red, sean_note.
#   Em fields (only with --score-em): beat_description, checkpoint, character_id, case_class,
#   expected_verdict, expected_cites.

cases:

