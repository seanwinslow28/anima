# Em — vision-critic eval case set (labeled, segmented).
#
# DRAFT LABELS for Sean's ratification at STOP GATE 1. Every case points at a
# real, committed, viewable fixture (Act 1 approved/rejected frames, real Cy
# Bible plates with their production verdicts, Act 2 motion contact sheets).
# No invented frames. The labels are drafted from ground-truth metadata:
#   - Act 1 approved -> pass ; Act 1 rejected (FAIL code) -> fail
#   - Cy plate_verdicts.jsonl gemini_verdict + cites_identity_rule -> verdict + expected_cites
#   - Act 2 contact sheets -> motion_proper, intentionally red (see below)
# Sean is the single labeler (solo scale; no Cohen's k yet — see failure-modes.md D2).
#
# Segmentation (Sean's locked decision):
#   case_class: clean | identity_style   -> the "performs" segment (Em SHOULD catch)
#   case_class: motion_proper            -> reported APART, ships intentionally RED
#     (a contact sheet structurally can't see motion-proper; eval-strategy doc §3.5).
#
# Per-case schema:
#   name, description, checkpoint (phase_5_generate | phase_6_motion | phase_8_assemble),
#   character_id: which character the frame contains (drives select_references + criteria; default sean)
#   input (path under fixtures/), beat_description, impact_tags (list),
#   case_class (identity_style | clean | motion_proper),
#   expected_verdict (pass | borderline | fail),
#   expected_cites (criteria IDs a correct critic should cite; [] for clean),
#   defect_label (open-coded mode, or "clean"),
#   is_intentionally_red (bool),
#   sean_note (one-line rationale for the label — the externalized rubric)
#
# Ships-red discipline: do NOT tune a case until Em passes it. Editing a label
# is legitimate ONLY if the label was wrong (a validity fix), never to flatter Em.
#
# RATIFIED by Sean 2026-06-01 after the live baseline + frame review. Labels kept
# UNCHANGED. The 8 "clean" frames Em flagged (F13/F31/head-turn-02/06 → fail;
# F06/head-profile-left/neutral/contemplative → borderline) are CORRECTLY labeled
# pass — Sean confirmed F13/F31 are unmistakably the right Sean. Em's flags are
# REFERENCE-BLINDNESS (she gets no anchor image, only text), not bad frames. So
# the performs-segment precision (0.62) is the honest reference-blind baseline,
# and giving Em reference images is the locked #1 next fix
# (docs/anima-test-runs/2026-06-01-em-reference-blindness-FINDING.md).

