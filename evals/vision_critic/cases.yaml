# Em — vision-critic eval case set (v2: the ratified class-isolated corpus).
#
# REBUILT 2026-06-03 (eval-foundation reset, docs/2026-06-03-eval-foundation-reset-plan.md).
# The old 29-case set was retired wholesale: 19/23 fixtures were SHA-identical copies of
# Bible/source plates, the Bible's body turnarounds had drifted to ~1:4-1:5.3 heads, five
# fail cases carried compound labels, and per-class n was ~1. Its baseline figures
# (precision 0.62 / recall 1.00 / false_pass 0.15) are VOID. Do not compare against them.
#
# Corpus provenance: every frames/ fixture was authored by Sean in Google Flow (NB2,
# free tier) against prompts/eval-corpus/sean-anchor-fixture-corpus.md (v2, minimal
# grammar), with the two gold-standard turnaround sheets as references
# (characters/sean-anchor/source-refs/sean-character-{full-body,head}-turnaround.png).
# Sean viewed and RATIFIED every image + label on 2026-06-03 (pre-screened by Claude,
# ruled by Sean — ratify/re-roll/relabel per flag). Uniform JPEG 1376x768 (format call
# ratified 2026-06-03; uniformity over format).
#
# Fixture independence is ENFORCED: tests/test_fixture_contamination.py fails CI if any
# fixture shares a SHA-256 or inode with anything under characters/ or images/. Fixtures
# are never the references.
#
# Six ratified failure classes (defect_label carries EXACTLY ONE, or "clean"):
#   proportion | view-correctness | anatomy-count   (geometry -> Bible-lock owns the gate)
#   palette | construction-lines | shading-register (style    -> Em / T2 owns the gate)
# Em is MEASURED on all six here; layer ownership says who acts on them in production.
# Deferred (promotion trigger = clean corpus re-baselined): hair/jaw/eye identity modes.
#
# Conventions:
#   - FACING CONVENTION (locked 2026-06-03): "left profile" = subject faces screen-left.
#     The walk set (C03, P-D3, PA-D5, SH-D4) and C06 were relabeled right/left profile
#     accordingly — image divergence from the original prompt text, label follows image.
#   - VIEW-CORRECTNESS TRICK: V-* images are CLEAN drawings of the WRONG view. The
#     corruption lives in the case's DECLARED view (beat_description), not the pixels.
#     Em must compare declared-vs-drawn, not judge draftsmanship.
#   - PAIRED DESIGN: every defect names its clean pair (pair:). Defect = pair's beat
#     with exactly one axis corrupted.
#   - Borderlines (P-B2, V-B1, CL-B1, SH-B1) -> expected_verdict: borderline.
#
# RE-ROLLS LANDED 2026-06-04: P-B1 and PA-D4 were re-rolled by Sean in Flow and
# ratified (P-B1 now a true ~6.5-head borderline; PA-D4 text-free). The corpus is
# COMPLETE at 46 fixtures / 52 total cases (16 clean + 30 single-axis + 6 motion).
# Their addition does not move the G5 baseline (two added cases, not a re-baseline).
#
# Per-case schema: name, corpus_id, pair, description, checkpoint, character_id,
#   input, beat_description, impact_tags, case_class (clean | identity_style |
#   motion_proper), expected_verdict (pass | borderline | fail), expected_cites
#   (IR.sean.* where a handle exists; seam handles view.declared-view-matches-drawn-view
#   and anatomy.count-correct where none exists yet), defect_label,
#   is_intentionally_red, sean_note.
#
# Ships-red discipline: do NOT tune a case until Em passes it. A label edit is
# legitimate ONLY as a validity fix, never to flatter Em.

