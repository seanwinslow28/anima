  kind: real
  candidate: head-to-body proportion exactly 1:7, head height fits seven times into total body height
    crown-to-sole, hip line at four head-heights above the floor, knees at two head-heights from the floor,
    ankle break at one-half head-height; lean build but NOT elongated, NOT fashion-tall, NOT 1:8
  golden: drawn at the canonical 1-to-7 head-to-body proportion
  match: true
  why: 'exactly 1:7, explicitly not 1:8; matches the canonical proportion the golden names.'
- pair_id: real::proportion-pb1-borderline-under
  defect_class: proportion
  kind: real
