    the bridge of the nose and the far brow line still readable. The far cheek silhouette extends past
    the nose, not occluded by it. Pencil-test register: soft graphite line, light color wash, cross-hatch
    shadow, warm cream paper.'
  golden: turned about sixty degrees from camera, between a three-quarter view and a profile
  match: true
  why: '45 vs 60 degrees is the same turned-toward-profile pose family; look-and-feel matches and the exact degree is not what I am pinning.'
- pair_id: real::anatomy-ad1-six-fingers
