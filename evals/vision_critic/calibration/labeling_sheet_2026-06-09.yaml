    spread across the keys — count the four keytop fingertips before committing the contour, do not insert
    a sixth digit between index and middle. Right hand on the mouse: thumb wrapping the near side, index
    and middle resting on top of the mouse body, ring and pinky curled at the far side, five total. Render
    finger separation cleanly with warm-graphite contour so the count is verifiable.'
  golden: with five fingers on each hand
  match: true
  why: 'candidate enforces exactly five digits per hand, the count the golden requires.'
- pair_id: real::anatomy-ad2-fused-hand
  defect_class: anatomy-count
  kind: real
  candidate: 'Raised right hand at chest height, palm angled toward camera, fingers clearly separated
    and individually drawn — five distinct digits (thumb wrapping toward the viewer, four fingers spread
    with visible gaps between each, knuckles articulated). Each finger rendered with its own contour line
    in warm graphite #3D3530, with cross-hatched shadow in the gaps between fingers and along the underside
    of the palm. No mitten silhouette, no fused-digit blob, no glove. Hand drawn at readable scale — fingers
    individually legible at the frame''s output resolution.'
  golden: with a correctly formed hand showing five distinct fingers
  match: true
  why: 'five distinct fingers, no fused blob; delivers the golden''s correctly-formed hand.'
- pair_id: real::anatomy-ad3-third-arm
  defect_class: anatomy-count
  kind: real
  candidate: null
  golden: with the correct two arms
  match: null
  why: 'excluded - candidate is null (Em proposed nothing); unscoreable.'
- pair_id: real::anatomy-ad4-missing-leg
  defect_class: anatomy-count
  kind: real
  candidate: ' Both legs fully visible — two complete legs, four limbs total. Right leg extended forward
