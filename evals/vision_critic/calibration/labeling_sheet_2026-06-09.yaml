instructions: 'Em Gate-2 judge calibration — Sean''s ground-truth labels.

  For each pair below, the CANDIDATE is a corrective prompt-clause; the GOLDEN is a ratified human fix
  for some defect. Set `match: true` if applying the candidate would steer a re-generation toward the
  SAME fix as the golden (judge INTENT, not wording); else `match: false`. Add a one-line `why`. Leave
  `match` blank only if the pair is unscoreable. `kind` is context (real / cross_negative / hard_negative)
  — label on the clauses themselves, not the kind. The judge never sees `kind` or `why`.'
pairs:
- pair_id: real::proportion-pd1-chibi-idle
  defect_class: proportion
  kind: real
  candidate: heroic-realistic 1:7 head-to-body proportion (head height fits seven times into total body
    height, crown to sole); shoulder width 1.5 head-widths at neutral; hip line four head-heights above
    the floor; knees at two head-heights; lean adult build, NOT chibi, NOT super-deformed, NOT big-head
    small-body; the head must occupy roughly one-seventh of the figure's vertical extent
  golden: drawn at natural adult proportions, about seven heads tall
  match: true
  why: 'candidate locks the 1:7 head-to-body ratio the golden requires; the extra armature detail is fine.'
- pair_id: real::proportion-pd2-chibi-idle-2
  defect_class: proportion
  kind: real
  candidate: heroic-realistic proportion, 1:7 head-to-body ratio (head fits seven times into total body
    height crown-to-sole), shoulder width 1.5 head-widths at neutral, hip line four head-heights above
    the floor, knees at two head-heights, ankle break at one-half head-height — NOT chibi, NOT stylized-short,
    NOT super-deformed
  golden: drawn at natural adult proportions, about seven heads tall
  match: true
  why: 'same 1:7 ratio as the golden; the NOT-chibi guards just reinforce the required target.'
- pair_id: real::proportion-pd3-elongated-walk
  defect_class: proportion
  kind: real
  candidate: heroic-realistic 1:7 head-to-body proportion — head height fits seven times into total body
    height crown to sole. Hip line at exactly four head-heights above the floor; knees at two head-heights;
    ankle break at one-half head-height. Arms hang so the wrist falls at mid-thigh, never past. Build
    the figure against a seven-head armature underlay; do NOT elongate the legs or torso to a fashion-illustration
    silhouette.
  golden: drawn at natural adult proportions, about seven heads tall
  match: true
  why: '1:7 head-to-body on a seven-head armature; delivers the golden''s required proportion.'
- pair_id: real::proportion-pb2-borderline-over
