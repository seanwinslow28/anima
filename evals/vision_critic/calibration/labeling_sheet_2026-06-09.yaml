  kind: real
  candidate: 'Camera positioned directly behind Sean. Render only the back of the head and body — back
    of the skull, the nape, the hair crown-to-nape flow with the center cowlick reading as the highest
    point of the silhouette, the rear of the navy tee, the rear jeans pockets, the back of the heels.
    The head is NOT rotated toward the camera; head and shoulders share the same back-facing axis. No
    facial features visible from this angle: no eye, no eyebrow, no nose, no mouth, no ear, no jaw line,
    no cheek.'
  golden: three-quarter back angle, full body visible
  match: false
  why: 'golden wants a three-quarter back (a sliver of face); candidate hides the face entirely (full back). Different look.'
- pair_id: real::view-vb1-borderline-60deg
  defect_class: view-correctness
  kind: real
  candidate: 'Sean in a head-and-shoulders portrait, three-quarter view — body rotated approximately 45
