    crown to sole. Hip line at four head-heights above the floor; knees at two head-heights from the floor;
    ankle break at half a head-height. Lengthen the femur and tibia to match — Sean is structurally tall
    in the lower body, not compact.
  golden: drawn at the canonical 1-to-7 head-to-body proportion
  match: true
  why: '1:7 head-to-body, seven head-heights total; the lengthened legs still serve the required ratio.'
- pair_id: real::view-vd1-declared-3quarter-drawn-profile
  defect_class: view-correctness
  kind: real
  candidate: Sean stands in three-quarter view, body rotated approximately 45 degrees off-front toward
    screen-left, full body visible head-to-toe. Both eyes read — near eye in full, far eye foreshortened
    but present behind the bridge of the nose; far brow visible; the nose breaks the far-cheek silhouette
    slightly. Shoulders offset in depth (near shoulder forward, far shoulder receding), not stacked in
    profile. Right hand raised mid-gesture at chest height, palm angled toward camera, fingers relaxed
    and separable. Left hand relaxed at side. NOT a full profile — the far eye must not be hidden.
  golden: left profile, full body visible
  match: false
  why: 'golden wants a left profile (one eye); candidate drives a three-quarter view with both eyes. Different look, not the same frame.'
- pair_id: real::view-vd2-declared-front-drawn-3quarter
  defect_class: view-correctness
  kind: real
  candidate: 'STRICT FRONT VIEW: head and shoulders square to camera, zero rotation, face symmetric about
    the vertical midline. Both eyes equal in width and both fully visible — neither foreshortened. Nose
    ridge centered on the facial midline; both ears equally visible (or equally hair-occluded) at the
    silhouette edges. Shoulder line horizontal, both shoulders the same depth. Not three-quarter. Not
    turned.'
  golden: three-quarter view
  match: false
  why: 'golden wants three-quarter; candidate forces a strict square front view. Opposite ends of the same mismatch.'
- pair_id: real::view-vd3-declared-left-drawn-right
  defect_class: view-correctness
  kind: real
  candidate: 'Screen-relative orientation: the character''s body and face are turned so the camera sees
    the LEFT side of the head — nose, lips, and chin form the side silhouette along the LEFT edge of the
    frame; the back of the skull and nape sit toward the RIGHT edge. Do not mirror. Reference convention:
    screen-left = viewer''s left half of the canvas.'
  golden: right profile
  match: false
  why: 'golden wants right profile; candidate turns to show the LEFT side. A mirror flip, not the same view.'
- pair_id: real::view-vd4-declared-back-drawn-3quarter-back
