# Bea the Storyboard Artist — eval cases (scaffold stage).
#
# Unlike Sam's by-ear voice defects, Bea's named failure modes — shot-coverage
# gaps, orphan shots, and script<->board cast conflicts — are DETERMINISTIC
# (beat_id makes the beat<->shot link checkable), so the ships-red cases are
# GREEN catches here: storyboard_validate must raise. The composition/taste
# pairwise harness + the Sonnet/Gemini/Codex bake-off are DEFERRED (campaign
# items) — see README.md.
#
# Two kinds:
#   - positive: a beat_id-annotated ground-truth board that must round-trip
#     through load_shots + Bea's deterministic storyboard_validate (coverage +
#     conflict) against its source beat sheet.
#   - ships_red (detector: structural): a malformed board that storyboard_validate
#     must reject with the expected error.

cases:
  # ---------- positive: ground-truth board ----------
  - name: spark-shared-board-plumbing
    kind: positive
    description: >-
      The Spark, Shared — the beat_id-annotated ground-truth board derived from the
      shipped briefs/2026-06-10-spark-shared/shots.yaml. Tests the beats->board
      plumbing/coverage contract: every beat boarded, no orphans, every shot keeps
      its beat's focal cast (note beat 3 is mascot-only but its two-shot boards
      both — legal under beat.cast subset of shot.cast).
    known_namespaces: [sean, claude-mascot]
    beats: spark-shared-beats.json
    expected_shots: spark-shared-expected-shots.yaml

  # ---------- ships-red: deterministic structural defects (GREEN catches) ----------
  - name: coverage-gap
    kind: ships_red
    detector: structural
    description: A beat with no shot — the shot-coverage-gap failure class.
    known_namespaces: [sean, claude-mascot]
    beats: spark-shared-beats.json
    fixture_shots: ships-red/coverage-gap-shots.yaml
    expect_error: coverage gap

  - name: orphan-shot
    kind: ships_red
    detector: structural
    description: A shot pointing at a beat_id that does not exist in the sheet.
    known_namespaces: [sean, claude-mascot]
    beats: spark-shared-beats.json
    fixture_shots: ships-red/orphan-shot-shots.yaml
    expect_error: orphan

  - name: cast-conflict
    kind: ships_red
    detector: structural
    description: >-
      A shot that drops a character its beat is about — the script<->board
      conflict class (beat.cast not a subset of shot.cast).
    known_namespaces: [sean, claude-mascot]
    beats: spark-shared-beats.json
    fixture_shots: ships-red/cast-conflict-shots.yaml
    expect_error: conflict

  # ---------- Slice A: edit-frame-form lint (prompt quality; warning, eval-side only) ----------
  # The first costed run's biggest curation cost (post-mortem F2/F3): Bea wrote full
  # re-descriptions for NB2 *edit* frames. edit_frame_form_lint is a deterministic
  # warning — NOT a production gate (the human still curates). These two cases prove
  # it accepts the terse editing form and flags a full re-description.
  - name: edit-form-accepted
    kind: lint
    detector: edit_frame_form
    description: >-
      A chained looping board done right — frame 1 a full establishing prompt,
      frames 2-4 terse `Same … ONLY CHANGE:` deltas, frame 5 the loop-return
      `composition identical to frame 1`. The lint must ACCEPT it (no offenders).
    known_namespaces: [sean, claude-mascot]
    fixture_shots: prompt-quality/edit-form-board.yaml
    expect_flag: false

  - name: full-redescription-on-edit-frame
    kind: lint
    detector: edit_frame_form
    description: >-
      The F2 anti-pattern — frame 2 is a full literary re-description of the whole
      scene instead of a terse edit delta. The lint must FLAG it (frame 2 offends).
    known_namespaces: [sean, claude-mascot]
    fixture_shots: ships-red/full-redescription-shots.yaml
    expect_flag: true

  # ---------- Slice B: loop-return chain_from lint (warning, eval-side only) ----------
  # F3 structural half (post-mortem): the loop-return frame must DECLARE its loop
  # anchor with chain_from: 1 so resolve_references chains it off frame 1, not the
  # prior (delight) frame. chain_from_lint flags a loop-return frame missing it.
  - name: chain-from-on-loop-return-accepted
    kind: lint
    detector: chain_from
    description: >-
      The done-right looping board — the loop-return frame (frame 5, "composition
      identical to frame 1") carries chain_from: 1. The lint must ACCEPT it.
    known_namespaces: [sean, claude-mascot]
    fixture_shots: prompt-quality/edit-form-board.yaml
    expect_flag: false

  - name: loop-return-missing-chain-from
    kind: lint
    detector: chain_from
    description: >-
      The F3 defect — a loop-return frame authored without chain_from: 1, so it
      would still chain off the prior (delight) frame. The lint must FLAG it.
    known_namespaces: [sean, claude-mascot]
    fixture_shots: ships-red/loop-return-missing-chain-from-shots.yaml
    expect_flag: true
