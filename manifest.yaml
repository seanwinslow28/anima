project:
  name: "anima"
  version: "2.0-draft"
  description: "Human + AI 2D animation pipeline. First reference implementation: Pencil Test — Sean Winslow (Act 1 shipped, Act 2 in progress)."

anchor:
  path: "images/2D-Character-Sketch-Sean-v1.png"
  label: "A-2"
  description: "Sean character design — identity reference for all generated frames"

style:
  aesthetic: "traditional animation pencil test"
  paper_color: "#FAF5E8"  # warm cream
  line_color: "warm graphite gray, NOT black ink (HB to 2B pencil range)"
  line_weight: "varied, 1-3px equivalent — thick contour, thin interior detail"
  color_palette: "limited desaturated flat fills — dark navy shirt, cool gray jeans, warm skin tones, muted sandy blonde hair"
  required_elements:
    - "three hole-punch marks at bottom edge"
    - "hand-written production label (A-#) in top-left corner in a circle"
    - "visible construction line artifacts beneath final drawing"
    - "cross-hatching in shadow areas (under chin, clothing folds)"
    - "warm cream paper with visible grain texture"
  negatives:
    - "no vector-clean lines"
    - "no solid black outlines or ink lines"
    - "no cel shading or anime style"
    - "no gradient shading or airbrush effects"
    - "no pure white background"
    - "no saturated or vibrant colors"

generation:
  model: "gemini-3.1-flash-image-preview"
  aspect_ratio: "16:9"
  script: ".claude/skills/gemini-pencil-animation-image-gen/scripts/generate_image.py"
  env_file: ".env"
  max_retries: 3
  prompt_source: "docs/act1-keyframe-prompts.md"
  style_cluster: ".claude/skills/gemini-pencil-animation-image-gen/references/pencil-animation-prompt-templates.md"

act1:
  name: "The Hero Loop"
  duration: "3-5 seconds"
  fps: 12
  timing: "on twos"
  resolution: "1920x1080"
  total_frames: 42

  keyframes:
    - frame: 1
      label: "A-2"
      source: "anchor"
      pose: "idle hold — relaxed standing, holding stylus in right hand, weight on back leg"
      hold_frames: 5  # F1-F5

    - frame: 6
      label: "A-3"
      pose: "glance down — head tilts ~15 degrees downward, eyes on stylus, contemplative"
      references: ["anchor"]
      hold_frames: 4  # F6-F9

    - frame: 10
      label: "A-4"
      pose: "the spark — head snaps up, eyebrows lift, mouth opens to half-smile, creative idea"
      references: ["anchor", "F06"]
      hold_frames: 3  # F10-F12

    - frame: 13
      label: "A-5"
      pose: "wind up — right arm lifts with elbow lead, stylus to head height, body leans forward"
      references: ["anchor", "F10"]
      hold_frames: 5  # F13-F17

    - frame: 18
      label: "A-6"
      pose: "mid-gesture — arm sweeps right in confident arc, maximum dynamic motion, pencil trail"
      references: ["anchor", "F13"]
      hold_frames: 13  # F18-F30 (holds through sprite sequence)

    - frame: 31
      label: "A-7"
      pose: "sprite lands — head turned left looking at own left shoulder, warm smirk, quiet pride"
      references: ["anchor"]  # Fresh chain start
      hold_frames: 5  # F31-F35

    - frame: 36
      label: "A-8"
      pose: "the nod — chin drops 15-20 degrees, eyes half-close, definitive satisfied nod"
      references: ["anchor", "F31"]
      hold_frames: 4  # F36-F39

    - frame: 40
      label: "A-9"
      source: "anchor"
      pose: "return to idle — matches F1 exactly for seamless loop"
      hold_frames: 3  # F40-F42 (3 frames to reach 42 total)

  generation_chains:
    chain_1: ["F06", "F10", "F13", "F18"]
    chain_2: ["F31", "F36"]

audit:
  hard_fails:
    HF01:
      name: "Wrong aspect ratio"
      test: "Image is not 16:9 (within 2% tolerance)"
      method: "PIL image dimensions check"
    HF02:
      name: "Missing paper texture"
      test: "Background is pure white, gray, or missing cream paper grain"
      method: "Claude vision check"
    HF03:
      name: "Character facing wrong direction"
      test: "Character orientation doesn't match storyboard beat description"
      method: "Claude vision check"
    HF04:
      name: "Wrong pose"
      test: "Pose doesn't match storyboard beat (arms/head/body position wrong)"
      method: "Claude vision check against storyboard description"
    HF05:
      name: "Wrong aesthetic"
      test: "Digital/anime/3D render look instead of pencil test drawing"
      method: "Claude vision check"

  soft_fails:
    SF01:
      name: "Style drift from A-2"
      test: "Line weight inconsistent with anchor, construction lines absent, cross-hatching missing"
      retry: "Re-anchor with A-2, add style refinement prompt from pencil-animation-prompt-templates.md"
    SF02:
      name: "Identity drift"
      test: "Facial features don't match Sean — hair shape, jaw angle, eye spacing differ from A-2"
      retry: "Re-anchor from A-2 with explicit identity correction notes"
    SF03:
      name: "Proportion drift"
      test: "Head-to-body ratio, arm length, or overall height inconsistent with A-2"
      retry: "Add explicit proportion constraints referencing A-2 measurements"
    SF04:
      name: "Paper texture inconsistency"
      test: "Wrong grain pattern, missing hole-punch marks, missing production label"
      retry: "Add paper texture refinement block from prompt templates"
    SF05:
      name: "Expression mismatch"
      test: "Facial expression doesn't match storyboard beat description"
      retry: "Add explicit expression direction from act1-keyframe-prompts.md"

  retry_ladder:
    attempt_1: "Run with original prompt from act1-keyframe-prompts.md"
    attempt_2: "Re-anchor from A-2 + add specific correction notes based on audit failure"
    attempt_3: "Tighten prompt constraints using refinement tips from pencil-animation-prompt-templates.md"
    attempt_4: "STOP — flag for human review with diagnostic report"

export:
  formats:
    gif:
      width: 480
      fps: 15
      max_size_mb: 5
      method: "two-pass palette generation"
    webm:
      width: 1920
      codec: "libvpx-vp9"
      crf: 30
    mp4:
      width: 1920
      codec: "libx264"
      crf: 18
      description: "archival quality"

