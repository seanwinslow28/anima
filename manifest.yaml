project:
  name: "anima"
  version: "2.0-draft"
  description: "Human + AI 2D animation pipeline. First reference implementation: Pencil Test — Sean Winslow (Act 1 shipped, Act 2 in progress)."

anchor:
  # Commit 2.0 migrated the anchor to characters/sean-anchor/anchor.png as part
  # of the Character Bible primitive (per brainstorm TOP-1). The legacy path
  # images/2D-Character-Sketch-Sean-v1.png is a back-compat symlink through
  # commit 7 (Animatic ingestion lands and Act 2 work is structurally complete).
  # Pencil-test scripts that haven't been updated yet resolve through the symlink.
  path: "characters/sean-anchor/anchor.png"
  label: "A-2"
  description: "Sean character design — identity reference for all generated frames"

style:
  aesthetic: "traditional animation pencil test"
  paper_color: "#FAF5E8"  # warm cream
  line_color: "warm graphite gray, NOT black ink (HB to 2B pencil range)"
  line_weight: "varied, 1-3px equivalent — thick contour, thin interior detail"
  color_palette: "limited desaturated flat fills — dark navy shirt, cool gray jeans, warm skin tones, muted sandy blonde hair"
  required_elements:
    - "three hole-punch marks at bottom edge"
    - "hand-written production label (A-#) in top-left corner in a circle"
    - "visible construction line artifacts beneath final drawing"
    - "cross-hatching in shadow areas (under chin, clothing folds)"
    - "warm cream paper with visible grain texture"
  negatives:
    - "no vector-clean lines"
    - "no solid black outlines or ink lines"
    - "no cel shading or anime style"
    - "no gradient shading or airbrush effects"
    - "no pure white background"
    - "no saturated or vibrant colors"

generation:
  model: "gemini-3.1-flash-image-preview"
  aspect_ratio: "16:9"
  script: ".claude/skills/gemini-pencil-animation-image-gen/scripts/generate_image.py"
  env_file: ".env"
  max_retries: 3
  prompt_source: "docs/act1-keyframe-prompts.md"
  style_cluster: ".claude/skills/gemini-pencil-animation-image-gen/references/pencil-animation-prompt-templates.md"

  # Flo — the Phase 5 generation router (build plan: docs/2026-06-10-flo-router-build-plan.md).
  # Per-shot-type route table mirroring Image-Model-DR-2026/SYNTHESIS.md §2. Each route =
  # {transport, model, usd_per_frame, tier, status}. The single-model fields above stay for
  # back-compat: when this `routing:` block is ABSENT, Flo falls through to the legacy
  # single-model frame_generate path unchanged.
  #
  # Cosmetic-honest (the T2/T3 lesson): status: wired = transport is live; status:
  # declared/deferred = config exists but the transport is NOT wired, so Flo raises a clear
  # "route declared, transport not wired" error rather than silently mis-generating.
  #
  # Flo-B (2026-06-10, costed pilot — evals/bakeoffs/2026-06-10-flo-inbetween-pencil-pilot/):
  # the in-between tiers PIVOTED to NB2/NB Pro. Sean's eye disqualified both fal candidates on the
  # approved Act-1 in-between corpus — fal Seedream morphs faces through the tween (the Reve
  # failure DINOv2 misses) and fal Qwen-Image-Edit-Plus reframes/degrades. NB2 is the in-between
  # winner; NB Pro the quality backup. The VERIFIED fal transports live on in
  # pipeline/agents/fal_runner.py (retained for future non-pencil creation); self-hosted FLUX +
  # Shakker sketch-LoRA is ticketed as the $0-ongoing in-between future.
  routing:
    hero_keyframe:     { transport: nb_pro, model: gemini-3-pro-image-preview,        usd_per_frame: 0.15,  tier: pro,   status: wired }
    standard_keyframe: { transport: nb2,    model: gemini-3.1-flash-image-preview,    usd_per_frame: 0.07,  tier: draft, status: wired }
    in_between_cheap:  { transport: nb2,    model: gemini-3.1-flash-image-preview,    usd_per_frame: 0.07,  tier: draft, status: wired }   # Flo-B: NB2 pivot (winner)
    in_between_mid:    { transport: nb_pro, model: gemini-3-pro-image-preview,        usd_per_frame: 0.15,  tier: pro,   status: wired }   # Flo-B: NB Pro backup
    mask_edit:         { transport: gpt_image_2,                                      usd_per_frame: 0.21,               status: deferred }
  fallback: nb2   # a deferred/failed route falls back to the wired NB2 path

act1:
  name: "The Hero Loop"
  duration: "3-5 seconds"
  fps: 12
  timing: "on twos"
  resolution: "1920x1080"
  total_frames: 42

  # Each keyframe may carry an optional impact_tags list. When a tag matches
  # critics.t2.escalation_tags (above), Em (the T2 vision critic) forces the
  # Opus 4.7 escalation path regardless of Gemini's confidence. Tags currently
  # honored: [hero, identity_critical]. Maya (commit 3, Phase 0 planner) will
  # populate impact_tags from the brief; for the pencil-test reference
  # implementation, the field stays optional and unset.
  keyframes:
    - frame: 1
      label: "A-2"
      source: "anchor"
      pose: "idle hold — relaxed standing, holding stylus in right hand, weight on back leg"
      hold_frames: 5  # F1-F5

    - frame: 6
      label: "A-3"
      pose: "glance down — head tilts ~15 degrees downward, eyes on stylus, contemplative"
      references: ["anchor"]
      hold_frames: 4  # F6-F9

    - frame: 10
      label: "A-4"
      pose: "the spark — head snaps up, eyebrows lift, mouth opens to half-smile, creative idea"
      references: ["anchor", "F06"]
      hold_frames: 3  # F10-F12

    - frame: 13
      label: "A-5"
      pose: "wind up — right arm lifts with elbow lead, stylus to head height, body leans forward"
      references: ["anchor", "F10"]
      hold_frames: 5  # F13-F17

    - frame: 18
      label: "A-6"
      pose: "mid-gesture — arm sweeps right in confident arc, maximum dynamic motion, pencil trail"
      references: ["anchor", "F13"]
      hold_frames: 13  # F18-F30 (holds through sprite sequence)

    - frame: 31
      label: "A-7"
      pose: "sprite lands — head turned left looking at own left shoulder, warm smirk, quiet pride"
      references: ["anchor"]  # Fresh chain start
      hold_frames: 5  # F31-F35

    - frame: 36
      label: "A-8"
      pose: "the nod — chin drops 15-20 degrees, eyes half-close, definitive satisfied nod"
      references: ["anchor", "F31"]
      hold_frames: 4  # F36-F39

    - frame: 40
      label: "A-9"
      source: "anchor"
      pose: "return to idle — matches F1 exactly for seamless loop"
      hold_frames: 3  # F40-F42 (3 frames to reach 42 total)

  generation_chains:
    chain_1: ["F06", "F10", "F13", "F18"]
    chain_2: ["F31", "F36"]

audit:
  hard_fails:
    HF01:
      name: "Wrong aspect ratio"
      test: "Image is not 16:9 (within 2% tolerance)"
      method: "PIL image dimensions check"
    HF02:
      name: "Missing paper texture"
      test: "Background is pure white, gray, or missing cream paper grain"
      method: "Claude vision check"
    HF03:
      name: "Character facing wrong direction"
      test: "Character orientation doesn't match storyboard beat description"
      method: "Claude vision check"
    HF04:
      name: "Wrong pose"
      test: "Pose doesn't match storyboard beat (arms/head/body position wrong)"
      method: "Claude vision check against storyboard description"
    HF05:
      name: "Wrong aesthetic"
      test: "Digital/anime/3D render look instead of pencil test drawing"
      method: "Claude vision check"

  soft_fails:
    SF01:
      name: "Style drift from A-2"
      test: "Line weight inconsistent with anchor, construction lines absent, cross-hatching missing"
      retry: "Re-anchor with A-2, add style refinement prompt from pencil-animation-prompt-templates.md"
    SF02:
      name: "Identity drift"
      test: "Facial features don't match Sean — hair shape, jaw angle, eye spacing differ from A-2"
      retry: "Re-anchor from A-2 with explicit identity correction notes"
    SF03:
      name: "Proportion drift"
      test: "Head-to-body ratio, arm length, or overall height inconsistent with A-2"
      retry: "Add explicit proportion constraints referencing A-2 measurements"
    SF04:
      name: "Paper texture inconsistency"
      test: "Wrong grain pattern, missing hole-punch marks, missing production label"
      retry: "Add paper texture refinement block from prompt templates"
    SF05:
      name: "Expression mismatch"
      test: "Facial expression doesn't match storyboard beat description"
      retry: "Add explicit expression direction from act1-keyframe-prompts.md"

  retry_ladder:
    attempt_1: "Run with original prompt from act1-keyframe-prompts.md"
    attempt_2: "Re-anchor from A-2 + add specific correction notes based on audit failure"
    attempt_3: "Tighten prompt constraints using refinement tips from pencil-animation-prompt-templates.md"
    attempt_4: "STOP — flag for human review with diagnostic report"

export:
  formats:
    gif:
      width: 480
      fps: 15
      max_size_mb: 5
      method: "two-pass palette generation"
    webm:
      width: 1920
      codec: "libvpx-vp9"
      crf: 30
    mp4:
      width: 1920
      codec: "libx264"
      crf: 18
      description: "archival quality"

# ---------------------------------------------------------------------------
# anima v2 architecture — additive optional blocks
# ---------------------------------------------------------------------------
# Everything below is schema for the v2 architecture locked 2026-05-25. The
# blocks are intentionally minimal in commit 1; per-phase wiring lands across
# commits 2-7. Existing pencil-test workflows above this line are not affected.
#
# Authoritative spec: docs/pipeline-architecture-v1.md
# ---------------------------------------------------------------------------

# Phase definitions for the 10-phase architecture.
# Authoritative spec: docs/pipeline-architecture-v1.md §The 10 Phases
#
# Commit 4 extends this block with per-phase `nodes:` sub-lists declaring
# which AgentSpec implementations run in each phase. The DAG runner
# (pipeline/dag.py, USE_DAG_RUNNER=1) reads these and assembles a graph.
# Each node entry:
#   id: unique node id (string, unique across the whole manifest)
#   node: NODE_REGISTRY key (e.g., "frame_generate", "audit_gate",
#         "seedance_motion", "assemble")
#   config: static node config (dict; optional, default {})
#   inputs: dict of port name → binding spec; one of
#           "literal:foo" | "node:other_id.port" | "manifest:dotted.path"
#   depends_on: list of upstream node ids (optional, default [])
#   tier: draft | pro (optional, default "draft")
#
# Example wiring (commented out — Act 2 work continues on the legacy path):
#
#   phase_5:
#     nodes:
#       - id: f06_generate
#         node: frame_generate
#         inputs:
#           frame_num: literal:6
#           prompt: literal:"glance down — head tilts ~15 degrees..."
#           references: literal:["images/2D-Character-Sketch-Sean-v1.png"]
#       - id: f06_audit
#         node: audit_gate
#         depends_on: [f06_generate]
#         inputs:
#           candidate_path: node:f06_generate.candidate_path
#           frame_num: literal:6
#           pose_description: literal:"glance down ..."
phases:
  # Listed sequentially; per-phase definitions live in the architecture doc.
  enabled: []  # commit 4 enables 'phase_0' through 'phase_9' as their nodes land

# Draft → Pro tier escalation defaults.
# Authoritative spec: docs/pipeline-architecture-v1.md §Draft → Pro Coverage by Phase
tiering:
  default_tier: draft
  # per-phase overrides land with commit 5 (Draft → Pro DAG implementation)

# Critic checkpoint placement (declared now, implemented across commits 8-9).
# Authoritative spec: docs/pipeline-architecture-v1.md §Critic Stack (Full)
critics:
  placement:
    post_animatic: T3
    per_frame_generate: [T1, T2]
    post_motion: T2
    post_assemble: T2
    pre_museum_publish: T3

  # T2 — Em (vision critic). Locked per docs/2026-05-26-agent-fleet-brainstorm-v2.md §6.
  # gemini-3.5-flash via the Gemini API (transport: gemini_api) is the default; Opus 4.7
  # via Claude Agent SDK is the escalation hatch on confidence < escalation_threshold OR
  # impact_tag in escalation_tags. (The old "Gemini 3.1 Pro via Anti-Gravity CLI" label
  # was aspirational — agy ran the backend-default Flash; 2026-06-02 forensics.) Claude
  # is subscription-absorbed; Gemini is the bounded GEMINI_API_KEY (fleet-ops billing).
  #
  # auto_apply: false is the v2 lock — patches stage, Sean reviews. Per-call and
  # wall budgets mirror the vault_critic precedent so the contract surface stays
  # consistent across critic agents.
  t2:
    # CORRECTED 2026-06-02 (A3) from the aspirational "gemini-3.1-pro-via-anti-gravity"
    # label. Forensics: agy passed no -m flag, so its Em calls ran the Antigravity
    # backend default = "Gemini 3.5 Flash (Medium)", NOT Pro (272/272 Em-sized calls,
    # incl. the 0.62 baseline). This field is cosmetic — no code reads it; the live
    # model is pinned in gemini_api_runner.GEMINI_VISION_MODEL (gemini-3.5-flash) via
    # the transport below — but a shipped label must be honest. If Em ever moves to
    # gemini-3.1-pro, that is a deliberate model-upgrade experiment, pinned by ID and
    # re-baselined; see docs/2026-06-02-em-provenance-and-hardening-kickoff.md.
    default_model: "gemini-3.5-flash"
    escalation_model: "claude-opus-4-7-via-sdk"
    escalation_threshold: 0.7
    escalation_tags: [hero, identity_critical]
    # Reference-grounding (A1, 2026-06-02). When false (default), Em runs
    # reference-blind: no Bible reference bundle, no IR/AC criteria block on the
    # subject prompt — the safe recall-1.00 / false_pass-0.00 profile. The PR #13
    # grounding path (attach the anchor + turnarounds + cite the rules) measured as
    # a REGRESSION in the 2026-06-02 re-baseline (false_pass 0.00->0.15, recall
    # 1.00->0.85) and is gated off pending a deterministic identity backstop (DINOv2)
    # + a clean re-baseline that clears the false-pass gate. Set true to restore the
    # bundle once that lands. Read by pipeline.agents.vision_critic._attach_references.
    # See docs/2026-06-02-em-provenance-and-hardening-kickoff.md §A1.
    attach_references: false
    # Criteria-text grounding (G6.1b, RATIFIED 2026-06-08). Attaches the IR/AC
    # criteria block (the text handles Em cites) to the subject prompt WITHOUT any
    # reference images — decoupled from attach_references. The 2026-06-08 N=5
    # criteria-attached run measured this ON as the safe, high-citation profile:
    # performs precision 0.97 / recall 1.00 / false_pass 0.00, cites-correct 0.97
    # (up from 0.03 blind) — Outcome A. This is the production default now (sean
    # corpus-validated; mascot spot-checked, its 25-rule Bible surfaces correctly).
    # Read by pipeline.agents.vision_critic._attach_criteria_text. Field report:
    # docs/anima-test-runs/2026-06-08-em-g6.1b-criteria-attached-run.md.
    attach_criteria_text: true
    # Gemini delivery transport for Em. agy = Antigravity CLI (subscription, but
    # personal-tier quota 429-blocks repeated runs); gemini_api = direct Gemini
    # API via GEMINI_API_KEY (separate vendor billing; unblocks the live
    # re-baseline). Model held constant either way — see pipeline/agents/
    # gemini_api_runner.GEMINI_VISION_MODEL. Adopted 2026-06-02.
    transport: gemini_api
    default_context_files:
      - PHILOSOPHY.md
      - CLAUDE.md
      - docs/pipeline-architecture-v1.md
    auto_apply: false
    per_call_timeout_s: 120
    wall_budget_s: 600

  # T3 — the multi-CLI variance council (the vault_critic pattern). Three
  # heterogeneous peers fan out in parallel; a separate Opus chairman adjudicates.
  # Placement: pre_museum_publish (wired Session B 2026-06-10) + post_animatic
  # (declared seam — Phase 4 Animatic does not exist yet; ticketed, NOT wired).
  # Engine: pipeline/agents/t3_council.py (T3CouncilNode, Session A #41).
  #
  # COSMETIC-HONESTY (the t2 A3 lesson): the engine reads ONLY per_call_timeout_s
  # from this block today; the peer roster + transports are the code source of
  # truth in t3_council._PEERS (codie/annie/sage). The peers:/chairman: keys below
  # are the config-of-record and MUST match that roster — they document what serves,
  # they don't (yet) drive dispatch. If the engine is later wired to read peers
  # from config, this block becomes load-bearing; until then keep it non-contradictory.
  #
  # Annie is gemini_api, NOT agy (settled in docs/research/2026-06-10-t3-cli-
  # multimodal-smoke.md): agy v1.0.4 rejects -m and is an agentic harness unfit as
  # a deterministic critic transport. $0 incremental on subscriptions for codie
  # (ChatGPT Plus) + sage/chairman (Claude SDK); annie bills the bounded
  # GEMINI_API_KEY (fleet-ops billing), model pinned like Em.
  t3:
    peers:
      # production lens — OpenAI Codex CLI (codex exec -i <img>), ChatGPT Plus
      - name: codie
        transport: codex
      # visual + identity/continuity lens — Gemini API, pinned like Em
      - name: annie
        transport: gemini_api
        model: "gemini-3.5-flash"
      # narrative/beat lens — Opus 4.7 via the Claude Agent SDK (invoke_opus_vision)
      - name: sage
        transport: opus_vision
        model: "claude-opus-4-7-via-sdk"
    # The chairman is a SEPARATE Opus text call (Pattern C), not a promoted peer.
    chairman:
      transport: opus_text
      model: "claude-opus-4-8"
    auto_apply: false        # v2 lock — patches stage, Sean reviews; never auto-apply
    per_call_timeout_s: 120  # read by T3CouncilNode.run (the only key wired today)
    wall_budget_s: 600
    default_context_files:
      - PHILOSOPHY.md
      - CLAUDE.md
      - docs/pipeline-architecture-v1.md

# Character Bible registry.
# Authoritative spec: docs/pipeline-architecture-v1.md §The Character Bible Primitive
# Commit 2.0 migrated images/2D-Character-Sketch-Sean-v1.png → characters/sean-anchor/.
# Commit 2 / Task 1.8: per-character registry entries declare folder + style_register.
# Flo's Phase 5 routing reads style_register to pick the right generator. Per
# Sean's Bible authoring runs in Tasks 1.10 + 1.11, sean-anchor and claude-mascot
# are the two real Bibles authored end-to-end on commit 2's first day. Empty list
# stays valid for back-compat (Pencil Test Act 2 runs against the anchor: block above).
# Optional per-character model override (Amendment B, 2026-05-30). When absent,
# the register default applies: NB2 (gemini-3.1-flash-image-preview) for editing
# in every register; NB Pro reserved for painterly FINAL renders
# (watercolor / photoreal / 3d-rendered), guarded — a seam with no consumer yet.
# Read by pipeline.agents.character_designer._resolve_plate_model at plate time.
# Override shape:  generation_model: <slug>   final_model: <slug>
characters:
  sean-anchor:
    folder: characters/sean-anchor/
    style_register: pencil-test-colored   # First reference implementation — Pencil Test.
  claude-mascot:
    folder: characters/claude-mascot/      # Re-authored in place 2026-05-30 (pixel Bible archived
                                           # to characters/_archive/claude-mascot-pixel-art-8bit/).
    style_register: pencil-test-colored    # Same register as sean-anchor — Act 2 shoulder companion.
                                           # Source refs (C-B anchor, C-1 turnaround, A-7 pairing) in
                                           # characters/claude-mascot/source-refs/.

# Criteria sources — multi-file merge for the DAG runner.
# Authoritative spec: Cy brainstorm TOP-1 + Task 1.8.
# The runner calls pipeline.criteria.load_all_criteria(manifest) at run start;
# it concatenates the brief's AC.* graph + every loaded Bible's IR.* graph
# into one CriteriaBundle. Duplicate IDs across files raise; per-character IR
# namespacing (IR.{character_id}.*) prevents accidental collisions.
#
# The bibles: list references files that exist on disk when Cy has authored
# the Bible (Tasks 1.10 + 1.11 land the real Pass-1 artifacts via real Opus +
# NB Pro + Gemini calls in Sean's authoring session). Missing files are
# skipped non-fatally by load_all_criteria — listing them ahead of authoring
# is safe.
criteria_sources:
  brief_file: ""                          # briefs/{slug}/acceptance_criteria.json (Maya's AC.*)
  bibles:
    - characters/sean-anchor/acceptance_criteria.json
    - characters/claude-mascot/acceptance_criteria.json

# Museum auto-capture configuration.
# Authoritative spec: docs/pipeline-architecture-v1.md §Museum (orthogonal capture layer)
museum:
  publishing_target: sw-ai-pm-portfolio        # unchanged — Astro export follow-on target
  format: astro_content_collection             # unchanged
  # --- Museum capture layer (additive, 2026-05-31) ---
  # Schema source of truth: docs/museum-exhibit-schema.md
  capture:
    schema_version: "1.0"
    comparison_gifs: true                       # Phase 4 — render where a manual-left exists
  standalone:
    enabled: true
    render_target: museum/_site/                # Phase 5 self-contained static build
  noise_filter:                                 # Phase 2 — what is NOT an exhibit
    skip_suffixes: [".log"]
    skip_name_contains: ["-torch-install", "-torchvision-install"]
    aborted_means: "no approved/ AND no plate_verdicts.jsonl AND no bible_audit.jsonl AND no seedance/"
  project_slugs:                                # derive_project_slug rules (first match wins)
    character-bible:
      title: "Character Bible — building Cy in the open"
      match: ["cy-", "mascot", "bible", "sean-anchor", "two-character", "first-light", "emitter", "phase2-crop"]
    pencil-test:
      title: "Pencil Test — Sean Winslow"
      match: ["seedance", "act1", "act2", "head-turn", "pose", "kimodo", "run_"]

# Brief & Plan (Phase 0) configuration.
# Authoritative spec: docs/pipeline-architecture-v1.md §Phase 0 — BRIEF & PLAN
# Two-tier brief per Maya brainstorm TOP-1. Maya the planner (commit 3) reads
# from active_dir and writes the production brief, criteria, and plan back
# into the same directory. `pipeline plan init --target <active_dir>` scaffolds
# the templates; `pipeline plan show / approve / mutate` operate against the
# files Maya emits.
brief:
  active_dir: briefs/2026-05-27-pencil-test-act2   # adjust per piece
  studio_brief: 00_studio_brief.md
  production_brief: 01_production_brief.md
  criteria: acceptance_criteria.json               # symlink to a versioned file post-mutation
  plan: plan.md
  cost_preview: cost-preview.png                   # optional; non-blocking enhancement

# Acceptance criteria — the rubric Maya emits at Phase 0 post-approval.
# Authoritative spec: docs/2026-05-26-agent-fleet-brainstorm-v2.md §2.3 + §5 Pattern B.
#
# Empty in commit 4; Maya populates the file in commit 3. The runner enforces
# criteria_locked: true via pipeline/criteria.py — any mutation after lock
# requires --force-criteria-mutation and writes an entry to
# runs/{run_id}/criteria_audit.jsonl naming the actor and the reason.
acceptance_criteria:
  path: docs/acceptance_criteria.json
  criteria_locked: false
