character_id: sean
display_name: Sean Winslow
style_register: pencil-test-colored
palette:
- name: cream_paper
  hex: '#F2E6CC'
  role: Background paper substrate. Carries through every plate beneath the drawing; the grain and warmth read through the line work. Never a flat vector fill.
- name: warm_graphite_line
  hex: '#3D3530'
  role: Primary line weight (HB through 2B graphite equivalent). Construction lines, final contour, and cross-hatching. Warm dark gray, never pure black (#000000) and never cool gray.
- name: warm_skin
  hex: '#F0DFCB'
  role: Face and hands. A light warm tint distinct from the cream paper base by a slightly warmer, pinker cast (not bare paper). Shadow is warm-graphite cross-hatching following the form, never a flat gray fill.
- name: dirty_blonde_hair
  hex: '#AD9468'
  role: Hair top volume. Warm light-brown, not platinum and not dark brown. Flat color fill with warm-graphite cross-hatching for the shadowed underside and the part.
- name: navy_tee
  hex: '#243044'
  role: Default shirt fill. Flat color with cross-hatching at the under-arm and under-collar shadows. Not gradient-shaded, not vector-clean.
- name: cool_gray_jeans
  hex: '#5C6471'
  role: Default pants fill. Flat color with cross-hatching at fold and pocket shadows. The cool tint distinguishes the jeans from the warm graphite line so the silhouette reads at low resolution.
- name: warm_gray_sneakers
  hex: '#7E807B'
  role: Sneakers. Warm gray uppers; white soles and laces read as the paper base, not a separate fill.
- name: blue_eyes
  hex: '#4A6D8C'
  role: Irises. A mid cool blue reading clearly against the paper-base sclera in colored plates. Adjust on review. In line-only motion plates the eye is a lidded almond with no iris fill.
proportions:
  head_to_body: "1:7 — head height fits seven times into total body height, crown of head to sole of foot at neutral stance."
  head_to_body_target: 7.0
  tolerance_heads: [6.5, 7.5]
  shoulder_to_hip: "Shoulders ~1.5 head-widths; hip line ~4 head-heights off the floor (lower body structurally longer than upper)."
  notes: "Heroic-realistic working-illustrator adult proportion. Not chibi (Claude Mascot's territory), not stylized-tall (high-fashion register). The cleaner turnaround and the walk-cycle source plate are the canonical proportion truth; the 3D mannequin refs are pose-vocabulary, not identity."
identity_rules_pointer: acceptance_criteria.json
cy_confidence_notes: "Cy hedges five axes: (1) the head-turn frame-to-angle mapping is inferred without direct visual ground-truth — Sean should sanity-check the mapping before approval; (2) the back-of-skull silhouette is extrapolated from front + profile views; (3) the expression set is interpretive — four states authored from indirect references; (4) the walk-cycle motion plate is a single source pose, not a full cycle; (5) full color is canonical Sean (director decision, 2026-05-29) — the skin #F0DFCB and eye #4A6D8C hexes were sampled/estimated from the anchor and should be eyeballed against it. Full prose in cy-confidence-notes.md."
flux_lora_seed_plates:
- anchor.png
- turnarounds/body-3quarter.png
- turnarounds/head-front.png
- expressions/neutral.png
risks: risk-bible.md
