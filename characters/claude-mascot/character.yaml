character_id: claude-mascot
display_name: Claude Mascot
style_register: pencil-test-colored
palette:
- name: terracotta_orange_body
  hex: '#C77C52'
  role: "body-fill-primary \u2014 the rounded box; flat muted clay-orange with cross-hatched\
    \ warm-graphite shadow, never gradient- or cel-shaded"
- name: cream_paper
  hex: '#F2E6CC'
  role: "paper-base \u2014 the shared substrate with sean-anchor; grain and warmth\
    \ read through the line work, never a flat vector fill"
- name: warm_graphite_line
  hex: '#3D3530'
  role: "line-contour \u2014 construction cross-line, final contour, and cross-hatch;\
    \ warm dark gray, never pure black, never cool gray (carried from sean-anchor\
    \ for register parity)"
- name: terracotta_shadow
  hex: '#9E5A38'
  role: "shadow-hatch \u2014 the darker clay tone the warm-graphite cross-hatch reads\
    \ as where it sits over the body fill on the far side plane and the underside"
- name: cast_shadow_graphite
  hex: '#B3A78C'
  role: "cast-shadow \u2014 the soft, loose, hand-drawn graphite scribble directly\
    \ beneath the box on the paper, not a rendered drop-shadow"
- name: eye_dot_graphite
  hex: '#2E2823'
  role: "eye-and-brow-accent \u2014 the two dot eyes and the two short brow strokes;\
    \ the deepest warm-graphite mark on the face"
proportions:
  head_to_body: "N/A \u2014 the mascot is a single fused rounded-box body with no\
    \ separate head. The box silhouette reads ~1:1.2 (width:height), a rounded cube\
    \ slightly taller than wide."
  shoulder_to_hip: "N/A \u2014 no shoulders or hips. Two ear/arm nubs project from\
    \ the left and right faces at the box's mid-height; four stub legs sit close together\
    \ beneath the footprint."
  notes: 'Shoulder-companion scale is the load-bearing proportion cue: the box reads
    as roughly one adult-human-head tall, small enough to perch on Sean''s shoulder
    (canonical in A-7). Corners are generously radiused; the face sits directly on
    the upper-front face of the box. Never a sharp-edged cube, never a sphere, never
    a biped.'
identity_rules_pointer: acceptance_criteria.json
cy_confidence_notes: "Cy hedges five axes: (1) the C-1 SIDE view shows a circular\
  \ construction swirl on the body's side face \u2014 read as the pencil-test spherical-mass\
  \ construction mark, NOT authored as an identity feature; Sean should confirm feature\
  \ vs. construction. (2) Palette hexes (terracotta #C77C52, shadow #9E5A38, cast-shadow\
  \ #B3A78C) are eyeballed from C-B/A-7; warm-graphite line #3D3530 and cream paper\
  \ #F2E6CC are carried from sean-anchor for register parity \u2014 eyeball against\
  \ the anchor. (3) The box ratio ~1:1.2 is a visual estimate, not measured. (4) The\
  \ shoulder-companion scale rule grounds on a single two-shot (A-7). (5) No motion\
  \ plates exist \u2014 locomotion is unspecified; any Phase 6 mascot shot needs motion\
  \ authoring first. Full prose in cy-confidence-notes.md."
